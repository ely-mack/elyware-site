backend:
  name: github
  repo: ely-mack/elyware-site
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "index.html"
        fields:
          - { label: "Body", name: "body", widget: "code", default_language: "html", output_code_only: true }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "Styles"
        name: "styles"
        file: "style.css"
        fields:
          - { label: "CSS", name: "body", widget: "code", default_language: "css", output_code_only: true }
      - label: "Scripts"
        name: "scripts"
        file: "main.js"
        fields:
          - { label: "JavaScript", name: "body", widget: "code", default_language: "javascript", output_code_only: true }
